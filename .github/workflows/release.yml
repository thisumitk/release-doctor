name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@11.14.1
      - run: npm ci
      - run: npm run check
      - name: Check npm publication
        id: published
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$name@$version is already published on npm."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm with token
        if: steps.published.outputs.exists == 'false' && env.HAS_NPM_TOKEN == 'true'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm with trusted publishing
        if: steps.published.outputs.exists == 'false' && env.HAS_NPM_TOKEN != 'true'
        run: npm publish --provenance
      - name: Skip existing npm version
        if: steps.published.outputs.exists == 'true'
        run: echo "Skipping npm publish because this version already exists."
